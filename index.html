<!DOCTYPE html>
<html>
<body>

<textarea id="curhat"></textarea>
<button onclick="kirim()">Simpan</button>

<div id="hasil"></div>

<script>
function kirim() {
  let isi = document.getElementById("curhat").value;
  document.getElementById("hasil").innerHTML += "<p>" + isi + "</p>";
}
</script>

</body>
</html>
