<script>
  // Ambil data dari localStorage saat halaman dibuka
  window.onload = function() {
    let data = localStorage.getItem("curhatElsi");
    if (data) {
      document.getElementById("hasil").innerHTML = data;
    }
  };

  function kirim() {
    let isi = document.getElementById("curhat").value;
    let hasil = document.getElementById("hasil");

    if (isi.trim() === "") {
      alert("Jangan kosong dong 😭");
      return;
    }

    let newData = "<p>📝 " + isi + "</p>";
    
    // Tampilkan ke layar
    hasil.innerHTML += newData;

    // Simpan ke localStorage
    localStorage.setItem("curhatElsi", hasil.innerHTML);

    document.getElementById("curhat").value = "";
  }
</script>
