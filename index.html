<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Diary Elsi 💌</title>

  <style>
    body {
      font-family: Arial;
      background: #fef6f9;
      text-align: center;
      padding: 30px;
      transition: 0.3s;
    }

    .dark {
      background: #1e1e1e;
      color: white;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      max-width: 500px;
      margin: auto;
    }

    .dark .card {
      background: #2c2c2c;
    }

    textarea {
      width: 90%;
      height: 80px;
    }

    button {
      margin: 5px;
      padding: 8px 15px;
      border: none;
      border-radius: 8px;
      background: pink;
      cursor: pointer;
    }

    .item {
      background: #ffe6f0;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    .dark .item {
      background: #444;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>💌 Diary Elsi</h1>

  <textarea id="curhat"></textarea><br>

  <button onclick="tambah()">Simpan</button>
  <button onclick="hapusSemua()">Hapus Semua</button>
  <button onclick="darkMode()">🌙 Dark Mode</button>

  <div id="list"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("diaryElsi")) || [];

function tampil() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((item, index) => {
    list.innerHTML += `
      <div class="item">
        <b>${item.tanggal}</b><br>
        ${item.text}<br><br>

        <button onclick="edit(${index})">✏️ Edit</button>
        <button onclick="hapus(${index})">❌ Hapus</button>
      </div>
    `;
  });

  localStorage.setItem("diaryElsi", JSON.stringify(data));
}

function tambah() {
  let isi = document.getElementById("curhat").value;

  if (isi.trim() === "") {
    alert("Jangan kosong 😭");
    return;
  }

  let tanggal = new Date().toLocaleString();

  data.push({
    text: isi,
    tanggal: tanggal
  });

  document.getElementById("curhat").value = "";
  tampil();
}

function hapus(index) {
  data.splice(index, 1);
  tampil();
}

function hapusSemua() {
  data = [];
  tampil();
}

function edit(index) {
  let baru = prompt("Edit curhatan:", data[index].text);
  if (baru !== null) {
    data[index].text = baru;
    tampil();
  }
}

function darkMode() {
  document.body.classList.toggle("dark");
}

// load awal
tampil();
</script>

</body>
</html>
