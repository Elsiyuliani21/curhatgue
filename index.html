<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Diary Elsi</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fef6f9;
      text-align: center;
      padding: 30px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h1 {
      color: #ff6b9d;
    }

    textarea {
      width: 90%;
      height: 100px;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      background: #ff6b9d;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }

    .hasil p {
      background: #ffe6f0;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>💌 Diary Elsi</h1>
    <p>Tulis curhatan kamu di sini 😭</p>

    <textarea id="curhat"></textarea><br>

    <button onclick="kirim()">Simpan</button>
    <button onclick="hapus()">Hapus Semua</button>

    <div class="hasil" id="hasil"></div>
  </div>

  <script>
    window.onload = function() {
      let data = localStorage.getItem("curhatElsi");
      if (data) {
        document.getElementById("hasil").innerHTML = data;
      }
    };

    function kirim() {
      let isi = document.getElementById("curhat").value;

      if (isi.trim() === "") {
        alert("Jangan kosong 😭");
        return;
      }

      let tanggal = new Date().toLocaleString();
      let hasil = document.getElementById("hasil");

      let newData = "<p>📝 [" + tanggal + "]<br>" + isi + "</p>";

      hasil.innerHTML += newData;

      localStorage.setItem("curhatElsi", hasil.innerHTML);

      document.getElementById("curhat").value = "";
    }

    function hapus() {
      localStorage.removeItem("curhatElsi");
      document.getElementById("hasil").innerHTML = "";
    }
  </script>

</body>
</html>
